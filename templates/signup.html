<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up — FlowBoard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--border2:#2a2a3e;--text:#e2e2f0;--muted:#6b6b8a;--accent:#7c6af7;--danger:#ef4444}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px;width:min(420px,100%)}

  .logo{font-size:1.4rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:32px;text-align:center}
  .logo span{color:var(--accent)}

  h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
  .subtitle{font-size:0.82rem;color:var(--muted);margin-bottom:32px}

  .form-group{margin-bottom:18px}
  label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  input{width:100%;padding:12px 16px;background:#0a0a0f;border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s}
  input:focus{border-color:var(--accent)}

  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px 16px;font-size:0.82rem;color:#fca5a5;margin-bottom:20px}

  .hint{font-size:0.72rem;color:var(--muted);margin-top:5px}

  .submit-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;letter-spacing:0.01em}
  .submit-btn:hover{background:#6a58f5;transform:translateY(-1px)}

  .perks{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
  .perk{display:flex;align-items:center;gap:10px;font-size:0.8rem;color:var(--muted)}
  .perk-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}

  .divider{text-align:center;margin:24px 0;font-size:0.78rem;color:var(--muted);position:relative}
  .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
  .divider span{background:var(--surface);padding:0 12px;position:relative}

  .switch{text-align:center;font-size:0.82rem;color:var(--muted)}
  .switch a{color:var(--accent);text-decoration:none;font-weight:600}
  .switch a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>Board</span></div>
  <h1>Create account</h1>
  <p class="subtitle">Start organizing your work today</p>

  <div class="perks">
    <div class="perk"><span class="perk-dot"></span>Personal Kanban boards</div>
    <div class="perk"><span class="perk-dot"></span>Write or Die sessions saved privately</div>
    <div class="perk"><span class="perk-dot"></span>Your data, only visible to you</div>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/signup">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="yourname" required autofocus>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <p class="hint">Minimum 6 characters</p>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="••••••••" required>
    </div>
    <button type="submit" class="submit-btn">Create Account</button>
  </form>

  <div class="divider"><span>or</span></div>
  <p class="switch">Already have an account? <a href="/login">Sign in</a></p>
</div>
</body>
</html>
